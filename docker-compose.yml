version: '3.8'

services:
  chess-app:
    build:
      context: .
      args:
        - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
        - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
        - VITE_SERVER_URL=${VITE_SERVER_URL}
    ports:
      - "3001:3000"
    env_file:
      - .env
    restart: unless-stopped
